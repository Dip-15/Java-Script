        #BUTTON-1 {
            border: none;

            padding: 5px 15px;

        #BUTTON-2 {
            border-radius: 5px;

            border: none;
            background-color: lightgreen;
            border-radius: 10px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
    <button id="BUTTON-1" onclick=" cartQuantity++ ;  document.querySelector('#Cart-Summery').innerText = `Your bag has ${cartQuantity} items`; ">Add to bag</button>

    <button id="BUTTON-2" onclick=" cartQuantity-- ;  document.querySelector('#Cart-Summery').innerText = `Your bag has ${cartQuantity} items`; ">MOVE TO WISHLIST</button>

    <button id="BUTTON-3" onclick=" cartQuantity +=2 ;  document.querySelector('#Cart-Summery').innerText = `Your bag has ${cartQuantity} items`; "> Add 1+1 sale item</button>
