<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update</title>
</head>
<body>
   <script>
    let a = 5;
    let b = 4;
    let c = (a+b);
    console.log(c);

    let i = 5;
    i += 5;
    i -= 2;
    i /= 4;
    i++;
    console.log(i);

   </script> 
</body>
</html>
