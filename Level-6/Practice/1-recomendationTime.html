<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recomendation of Time</title>
  </head>
  <body>
    <div id="box"></div>
    <script>
      function doGreeting(personName = 'Krishna') {
        let myDate = new Date();
        let hours = myDate.getHours();
        let heading = document.querySelector("#box");
        if (hours >= 5 && hours < 12) {
          heading.innerText = `Good Morning ${personName}`;
        } else if (hours >= 12 && hours < 18) {
          heading.innerText = `Good Afternoon ${personName}`;
        } else if (hours >= 18 && hours < 19) {
          heading.innerText = `Good Evening ${personName}`;
        } else {
          heading.innerText = `Good Night ${personName}`;
        }
      }
      doGreeting();
    </script>
  </body>
</html>
