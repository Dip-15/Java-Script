<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add And Remove</title>
</head>
<body>
    <button class="my-class">This is the button</button>
    <script>
        // run this code with in console
         document.querySelector('.my-class').classList.add('your-class');
        document.querySelector('.my-class').classList.remove('my-class');
    </script>
</body>
</html>
