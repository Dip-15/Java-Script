<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>String Define</title>
  </head>
  <body>
    <script>
      let mango = 599;
      console.log("Hello " + "World");
      console.log("Hello" + " World");
      // another line
      console.log(`Mango is sweet, \n ofcourse! sweet.`);
      console.log("Mango is sweet, \n ofcourse! sweet.");
      //console.log('The price = ${mango}');
      console.log(`The price = ${mango}`);
      console.log("The price = ${mango}");
      //using concatenation
      console.log("The mango price = " + mango + ` It's fine`);
      console.log("The mango price = " + mango + " It is Fine");
      // console.log(+ mango +)
    </script>
  </body>
</html>
