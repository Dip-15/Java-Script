<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Each Loop</title>
</head>
<body>
    <script>
      let arr = [1,2,3,4,5,6,7,8,9];
      arr.forEach( num =>{
        if( num === 5) return;
        console.log(`Visited: ${num}`);
      }); 
    </script>
</body>
</html>
