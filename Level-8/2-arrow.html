<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrow Function</title>
  </head>
  <body>
    <script>
      //   let sum = function (num1, num2) {
      //     return num1 + num2;
      // };
      
      //   let sum = (num1, num2) => {
      //     return num1 + num2;
      //   };

      let sum = (num1, num2) => num1 + num2;
      console.log(sum(4, 5));

      //For single Argument
      let squre = (num) => {
        return num * num;
      };
      console.log(squre(5));

      let squre1 = num => num * num;
      console.log(squre1(8));
    </script>
  </body>
</html>
