<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Reduce</title>
</head>
<body>
    <script> 
        let arr = [1,2,3,4,5,6];
        const red = (a,b) => {
            return a*b
        }
        //Reduce use continuing of multiplication of each element in array and return final value
        console.log(arr.reduce(red));

        let arr1 = "Krishna";
        console.log(Array.from(arr1))
    </script>
</body>
</html>
