<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd And Even</title>
</head>
<body>
    <script>
        function oddAndeven(Number){
          let rem = Number % 2;
          let isOdd = rem === 1;
          return isOdd;
        } 
        console.log(oddAndeven(4));
        console.log(oddAndeven(5));
        console.log(oddAndeven(100));
        console.log(oddAndeven(999))
    </script>
</body>
</html>
