<!doctype html>
<html lang="en">
  <head>
    <title>Cricket Game Using Function Return</title>
    <style>
      body {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Bat Ball Stump Game</h1>
    <button
      onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = generateResult('Bat', computerChoice);
        showResult('Bat', computerChoice, resultMsg);
      "
    >
      Bat
    </button>

    <button
      onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = generateResult('Ball', computerChoice);
        showResult('Ball', computerChoice, resultMsg);
      "
    >
      Ball
    </button>

    <button
      onclick="
        let computerChoice = generateComputerChoice();
        let resultMsg = generateResult('Stump', computerChoice);
        showResult('Stump', computerChoice, resultMsg); 
        "
    >
      Stump
    </button>

    <script>
      function generateComputerChoice() {
        let randomNumber = Math.random() * 3;

        if (randomNumber >= 0 && randomNumber < 1) {
          return "Bat";
        } else if (randomNumber >= 1 && randomNumber < 2) {
          return "Ball";
        } else {
          return "Stump";
        }
      }

      function generateResult(userMove, computerMove) {
        if (userMove === "Bat") {
          if (computerMove === "Ball") {
            return "User won.";
          } else if (computerMove === "Bat") {
            return "It's a tie.";
          } else {
            return "Computer won.";
          }
        } else if (userMove === "Ball") {
          if (computerMove === "Ball") {
            return "It's a tie.";
          } else if (computerMove === "Bat") {
            return "Computer won.";
          } else {
            return "User won.";
          }
        } else if (userMove === "Stump") {
          if (computerMove === "Ball") {
            return "Computer won.";
          } else if (computerMove === "Bat") {
            return "User won.";
          } else {
            return "It's a tie.";
          }
        }
      }
     function showResult(userMove, computerMove, result) {
         alert(
          `You have chosen ${userMove}, Computer choice is 
          ${computerMove} and ${result}`
        );
     }
    </script>
  </body>
</html>
