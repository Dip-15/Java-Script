<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array Methodes</title>
  </head>
  <body>
    <script>
      let arr = [9, 4, 6, 7];
      console.log(arr);
      //start from 1 index and delete 2 elements;
      arr.splice(1, 2);
      console.log(arr);

      let arr4 = [10, 20, 30, 40];
      console.log(arr4.slice(1, 4));

      let arr1 = [4, 6, 9, 3];
      console.log(arr1.toString());

      let arr2 = ["asdf", "dcb", "gef", "cgh"];
      arr2.sort();
      console.log(arr2);

      let arr3 = [2, 8, 6, 5, 7];
      console.log(arr3.valueOf());

      let arr5 = [2, 8, 6, 5, 7];
      console.log(arr5.reverse());

    </script>
  </body>
</html>
