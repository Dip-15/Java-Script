<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Continue</title>
</head>
<body>
    <script>
         let arr = [1, 3, 5, 7, 6, 8, 2]; 
         for(let i = 0; i < arr.length; i++){
            if( arr[i] === 7){
                console.log(`Found the number ${arr[i]}`);
                break;
            }
            console.log(`Still finding`);
         }
         for ( let nums = 1; nums <= 25; nums++){
            if( nums % 2 === 0 ){
                continue;
            }
            console.log(nums);
         }
    </script>
</body>
</html>
