<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array Refrence</title>
  </head>
  <body>
    <script>
      let arr = [1, 3, 5, 9, 10];
      console.log(arr);
      let arr2 = arr;
      arr2[1] = 30;
      console.log(arr2);

      //Destructuring
      let arr1 = [1, 3, 5, 9, 10];
      console.log(arr1);
      let [a, b, c, d] = arr1;
      console.log(a + " " + b + " " + c + " " + d + " ");
      console.log(a + " " + d + " ");
    </script>
  </body>
</html>
