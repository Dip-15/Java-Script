<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside Object Define</title>
</head>
<body>
    <script>
        let product = {
            company: 'Ango',
            price: 599,
            itemName: 'T-shirt',
            //unlike variable type Properties should be defined using quotes;
            'item-Number': 500021,
            'shipping-Cost': 50, 
             displayPrice: function(){
                console.log(`Price of this product ₹${this.price} `)
            }
        };
        product.displayPrice();
    </script>
</body>
</html>
