<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Destructuring</title>
</head>
<body>
    <script>
        let popUp = {
            message: 'good job',
            status1: 'complete',
        };
        let {message , status1} = popUp;
        console.log( message, status1);
    </script>
</body>
</html>
