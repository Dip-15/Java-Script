<html lang="en">
  <head>

    <title>Method Shorthand</title>

  <body>
    <script>
      //The Method shorthand
      let price = 500;
      //  let product = {
      //     company: 'Ango',
      //     price,
      //     itemName: 'T-shirt',
      //     displayPrice: function(){
      //         return`prie of this product is  ₹${this.price} `},
      //     };
      let product = {
        company: "Ango",
        price,
        itemName: "T-shirt",
        displayPrice() {
          return `prie of this product is  ₹${this.price} `;
        },
      };
      console.log(product.displayPrice());
    </script>
  </body>
